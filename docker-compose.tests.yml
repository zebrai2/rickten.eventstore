# Docker Compose for Rickten EventStore Integration Tests
# 
# This provides local database instances for manual testing and development.
# The Testcontainers tests will automatically spin up their own containers.
#
# Usage:
#   Start:  docker-compose -f docker-compose.tests.yml up -d
#   Stop:   docker-compose -f docker-compose.tests.yml down
#   Clean:  docker-compose -f docker-compose.tests.yml down -v

version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rickten-sqlserver-test
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: rickten-postgres-test
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rickten_eventstore_tests
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sqlserver-data:
  postgres-data:
